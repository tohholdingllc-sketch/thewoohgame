# Codemagic CI — build cloud di The WOOH Game (Capacitor).
# L'app web (export statico Next in out/) viene impacchettata dentro Android/iOS.
#
# SETUP lato Codemagic (UI, una volta sola):
#  1) Collega il repo GitHub tohholdingllc-sketch/thewoohgame.
#  2) Crea un Environment group "supabase" con le variabili:
#       NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY
#  3) Android firmato (Play): carica un keystore -> group "google_play" (CM_KEYSTORE...).
#  4) iOS: collega l'integrazione "App Store Connect API key" + abilita automatic code signing.
# Il workflow Android "debug" produce subito un APK installabile per i test (nessuna firma).

workflows:
  android-debug:
    name: WOOH — Android APK (test)
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      node: 22
      groups:
        - supabase
    scripts:
      - name: Install deps
        script: npm ci
      - name: Env Supabase
        script: |
          printf 'NEXT_PUBLIC_SUPABASE_URL=%s\nNEXT_PUBLIC_SUPABASE_ANON_KEY=%s\n' \
            "$NEXT_PUBLIC_SUPABASE_URL" "$NEXT_PUBLIC_SUPABASE_ANON_KEY" > .env.local
      - name: Build web (export statico) + sync
        script: |
          npm run build
          npx cap sync android
      - name: Gradle assembleDebug
        script: |
          echo "=== JDK installati ==="; /usr/libexec/java_home -V 2>&1 || true
          export JAVA_HOME=$(/usr/libexec/java_home -v 21 2>/dev/null || /usr/libexec/java_home -v 23 2>/dev/null || /usr/libexec/java_home -v 22 2>/dev/null || /usr/libexec/java_home -v 24 2>/dev/null || echo "$JAVA_HOME")
          echo "JAVA_HOME scelto = $JAVA_HOME"; "$JAVA_HOME/bin/java" -version 2>&1 || true
          cd android && chmod +x ./gradlew && ./gradlew assembleDebug -Dorg.gradle.java.home="$JAVA_HOME"
    artifacts:
      - android/app/build/outputs/**/*.apk

  android-release:
    name: WOOH — Android AAB (Play Store)
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      node: 22
      android_signing:
        - woohgame_upload   # nome del keystore caricato in Codemagic (Code signing > Android)
      groups:
        - supabase
    scripts:
      - name: Install deps
        script: npm ci
      - name: Env Supabase
        script: |
          printf 'NEXT_PUBLIC_SUPABASE_URL=%s\nNEXT_PUBLIC_SUPABASE_ANON_KEY=%s\n' \
            "$NEXT_PUBLIC_SUPABASE_URL" "$NEXT_PUBLIC_SUPABASE_ANON_KEY" > .env.local
      - name: Build web (export statico) + sync
        script: |
          npm run build
          npx cap sync android
      - name: Gradle bundleRelease (firmato)
        script: |
          export JAVA_HOME=$(/usr/libexec/java_home -v 21 2>/dev/null || /usr/libexec/java_home -v 23 2>/dev/null || /usr/libexec/java_home -v 22 2>/dev/null || /usr/libexec/java_home -v 24 2>/dev/null || echo "$JAVA_HOME")
          cd android && chmod +x ./gradlew && ./gradlew bundleRelease -Dorg.gradle.java.home="$JAVA_HOME"
    artifacts:
      - android/app/build/outputs/**/*.aab

  ios:
    name: WOOH — iOS (App Store / TestFlight)
    instance_type: mac_mini_m1
    max_build_duration: 90
    integrations:
      app_store_connect: "TOH HOLDING LLC"   # deve combaciare col NOME della key in Codemagic (Apple Developer Portal)
    environment:
      node: 22
      xcode: latest
      groups:
        - supabase
    scripts:
      - name: Install deps
        script: npm ci
      - name: Env Supabase
        script: |
          printf 'NEXT_PUBLIC_SUPABASE_URL=%s\nNEXT_PUBLIC_SUPABASE_ANON_KEY=%s\n' \
            "$NEXT_PUBLIC_SUPABASE_URL" "$NEXT_PUBLIC_SUPABASE_ANON_KEY" > .env.local
      - name: Build web (export statico)
        script: npm run build
      - name: Aggiungi iOS + icone + sync (Capacitor 8 = SPM, niente Podfile)
        script: |
          npx cap add ios
          npx cap sync ios
          npx capacitor-assets generate --ios
          # Schema custom per il ritorno OAuth (Apple/Google) deep-link
          plutil -insert CFBundleURLTypes -json '[{"CFBundleURLSchemes":["com.thewoohgame.app"]}]' ios/App/App/Info.plist || true
          # Crittografia: solo HTTPS standard → esente, così App Store non chiede la documentazione
          plutil -insert ITSAppUsesNonExemptEncryption -bool NO ios/App/App/Info.plist || true
          # Build number = contatore Codemagic ($BUILD_NUMBER): App Store rifiuta CFBundleVersion duplicati
          plutil -replace CFBundleVersion -string "${BUILD_NUMBER:-2}" ios/App/App/Info.plist || true
      - name: Firma (crea cert+profilo) + build IPA
        script: |
          keychain initialize
          # La chiave privata del certificato arriva in base64 (CERT_KEY_B64) per non rovinare gli a-capo del PEM su CI
          printf '%s' "$CERT_KEY_B64" | python3 -c "import sys,base64; open('/tmp/cert_key.pem','wb').write(base64.b64decode(sys.stdin.read()))"
          app-store-connect fetch-signing-files "com.thewoohgame.app" --type IOS_APP_STORE --certificate-key @file:/tmp/cert_key.pem --create
          keychain add-certificates
          xcode-project use-profiles
          cd ios/App
          xcode-project build-ipa --project App.xcodeproj --scheme App
    artifacts:
      # build-ipa gira dentro ios/App (cd) → l'IPA è qui; la root è solo fallback.
      - ios/App/build/ios/ipa/*.ipa
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
