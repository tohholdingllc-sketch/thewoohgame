# Codemagic CI — build cloud di The WOOH Game (Capacitor).
# L'app web (export statico Next in out/) viene impacchettata dentro Android/iOS.
#
# SETUP lato Codemagic (UI, una volta sola):
#  1) Collega il repo GitHub tohholdingllc-sketch/thewoohgame.
#  2) Crea un Environment group "supabase" con le variabili:
#       NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY
#  3) Android firmato (Play): carica un keystore -> group "google_play" (CM_KEYSTORE...).
#  4) iOS: collega l'integrazione "App Store Connect API key" + abilita automatic code signing.
# Il workflow Android "debug" produce subito un APK installabile per i test (nessuna firma).

workflows:
  android-debug:
    name: WOOH — Android APK (test)
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      node: 22
      groups:
        - supabase
    scripts:
      - name: Install deps
        script: npm ci
      - name: Env Supabase
        script: |
          printf 'NEXT_PUBLIC_SUPABASE_URL=%s\nNEXT_PUBLIC_SUPABASE_ANON_KEY=%s\n' \
            "$NEXT_PUBLIC_SUPABASE_URL" "$NEXT_PUBLIC_SUPABASE_ANON_KEY" > .env.local
      - name: Build web (export statico) + sync
        script: |
          npm run build
          npx cap sync android
      - name: Gradle assembleDebug
        script: |
          echo "=== JDK installati ==="; /usr/libexec/java_home -V 2>&1 || true
          export JAVA_HOME=$(/usr/libexec/java_home -v 21 2>/dev/null || /usr/libexec/java_home -v 23 2>/dev/null || /usr/libexec/java_home -v 22 2>/dev/null || /usr/libexec/java_home -v 24 2>/dev/null || echo "$JAVA_HOME")
          echo "JAVA_HOME scelto = $JAVA_HOME"; "$JAVA_HOME/bin/java" -version 2>&1 || true
          cd android && chmod +x ./gradlew && ./gradlew assembleDebug -Dorg.gradle.java.home="$JAVA_HOME"
    artifacts:
      - android/app/build/outputs/**/*.apk

  android-release:
    name: WOOH — Android AAB (Play Store)
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      node: 22
      android_signing:
        - woohgame_upload   # nome del keystore caricato in Codemagic (Code signing > Android)
      groups:
        - supabase
    scripts:
      - name: Install deps
        script: npm ci
      - name: Env Supabase
        script: |
          printf 'NEXT_PUBLIC_SUPABASE_URL=%s\nNEXT_PUBLIC_SUPABASE_ANON_KEY=%s\n' \
            "$NEXT_PUBLIC_SUPABASE_URL" "$NEXT_PUBLIC_SUPABASE_ANON_KEY" > .env.local
      - name: Build web (export statico) + sync
        script: |
          npm run build
          npx cap sync android
      - name: Gradle bundleRelease (firmato)
        script: |
          export JAVA_HOME=$(/usr/libexec/java_home -v 21 2>/dev/null || /usr/libexec/java_home -v 23 2>/dev/null || /usr/libexec/java_home -v 22 2>/dev/null || /usr/libexec/java_home -v 24 2>/dev/null || echo "$JAVA_HOME")
          cd android && chmod +x ./gradlew && ./gradlew bundleRelease -Dorg.gradle.java.home="$JAVA_HOME"
    artifacts:
      - android/app/build/outputs/**/*.aab

  ios:
    name: WOOH — iOS (App Store / TestFlight)
    instance_type: mac_mini_m1
    max_build_duration: 90
    integrations:
      app_store_connect: codemagic   # nome dell'API key configurata in Codemagic
    environment:
      node: 22
      xcode: latest
      cocoapods: default
      groups:
        - supabase
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.thewoohgame.app
    scripts:
      - name: Install deps
        script: npm ci
      - name: Env Supabase
        script: |
          printf 'NEXT_PUBLIC_SUPABASE_URL=%s\nNEXT_PUBLIC_SUPABASE_ANON_KEY=%s\n' \
            "$NEXT_PUBLIC_SUPABASE_URL" "$NEXT_PUBLIC_SUPABASE_ANON_KEY" > .env.local
      - name: Build web (export statico)
        script: npm run build
      - name: Aggiungi iOS + sync + pods
        script: |
          npx cap add ios || true
          npx cap sync ios
          cd ios/App && pod install
      - name: Set signing + build IPA
        script: |
          xcode-project use-profiles
          cd ios/App
          xcode-project build-ipa --workspace App.xcworkspace --scheme App
    artifacts:
      - build/ios/ipa/*.ipa
